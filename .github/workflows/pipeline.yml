name: Pipeline
on:
  push:
    branches: [main]
  pull_request:

jobs:
  infrastructure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        run: |
          tflint --init --config "$(pwd)/terraform/.tflint.hcl" --chdir=terraform
          tflint --config "$(pwd)/terraform/.tflint.hcl" --chdir=terraform

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform

      - name: Install Checkov
        run: pip install checkov

      - name: Run checkov
        run: checkov -d terraform

  configuration-check:
    runs-on: ubuntu-latest
    needs: infrastructure-check # <--- HARD STOP if Terraform fails
    env:
      ANSIBLE_DEPRECATION_WARNINGS: "False"
      PYTHONWARNINGS: "ignore::DeprecationWarning"

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible-Lint
        run: pip install ansible-lint ansible-core

      - name: Install Collections
        # Ensures modules like ansible.posix are available for linting
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Create Fake Vault Pass
        # Prevents linting failure due to missing .vault_pass file
        run: echo "fake_password" > .vault_pass

      - name: Ansible Lint
        # Checks for syntax, type errors, and deprecated modules
        run: ansible-lint ansible/*.yml
